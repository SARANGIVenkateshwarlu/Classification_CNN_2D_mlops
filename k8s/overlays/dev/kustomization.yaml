apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: solar-panel-classifier-dev

namePrefix: dev-

commonLabels:
  environment: development
  app.kubernetes.io/part-of: solar-panel-classifier

resources:
  - ../../base

replicas:
  - name: solar-panel-api
    count: 1

patchesStrategicMerge:
  - replicas-patch.yaml

configMapGenerator:
  - name: solar-panel-config
    behavior: merge
    literals:
      - LOG_LEVEL=DEBUG
      - MODEL_PRELOAD=false

images:
  - name: solar-panel-classifier
    newTag: dev-latest
