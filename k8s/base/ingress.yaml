apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solar-panel-ingress
  namespace: solar-panel-classifier
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.solar-panel.example.com
        - app.solar-panel.example.com
      secretName: solar-panel-tls
  rules:
    - host: api.solar-panel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: solar-panel-api-service
                port:
                  number: 80
    - host: app.solar-panel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: solar-panel-streamlit-service
                port:
                  number: 80
