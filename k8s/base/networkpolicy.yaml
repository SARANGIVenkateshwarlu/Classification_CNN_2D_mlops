apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: solar-panel-api-netpol
  namespace: solar-panel-classifier
spec:
  podSelector:
    matchLabels:
      app: solar-panel-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: solar-panel-api
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
