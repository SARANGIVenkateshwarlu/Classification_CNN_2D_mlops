apiVersion: v1
kind: ServiceAccount
metadata:
  name: solar-panel-sa
  namespace: solar-panel-classifier
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::AWS_ACCOUNT_ID:role/solar-panel-classifier-role
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: solar-panel-role
  namespace: solar-panel-classifier
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: solar-panel-rolebinding
  namespace: solar-panel-classifier
subjects:
  - kind: ServiceAccount
    name: solar-panel-sa
    namespace: solar-panel-classifier
roleRef:
  kind: Role
  name: solar-panel-role
  apiGroup: rbac.authorization.k8s.io
