version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: solar-panel-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/trained_effnet_finetune.keras
      - MODEL_PRELOAD=true
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: solar-panel-streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./:/app
      - ./models:/app/models:ro
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

